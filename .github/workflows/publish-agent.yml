name: Publish Agent Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build weave-agent distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release tag matches agent version
        working-directory: ./agent
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          actual = "${{ github.ref_name }}"
          if actual != expected:
              raise SystemExit(
                  f"Release tag {actual!r} does not match agent version {expected!r}"
              )
          print(f"Validated release tag {actual} for weave-agent {version}")
          PY

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        working-directory: ./agent
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: weave-agent-dist
          path: agent/dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish weave-agent to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: weave-agent-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
