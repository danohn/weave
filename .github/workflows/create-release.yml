name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create-release:
    name: Create release from tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build weave-agent distributions
        working-directory: ./agent
        run: python -m build

      - name: Generate release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          repo = os.environ["REPO"]

          tags = subprocess.check_output(
              ["git", "tag", "--sort=-version:refname"],
              text=True,
          ).splitlines()
          previous_tag = next((item for item in tags if item != tag), "")

          if previous_tag:
              compare_range = f"{previous_tag}..{tag}"
              compare_url = f"https://github.com/{repo}/compare/{previous_tag}...{tag}"
          else:
              compare_range = tag
              compare_url = f"https://github.com/{repo}/tree/{tag}"

          log_cmd = ["git", "log", "--no-merges", "--pretty=format:%s", compare_range]
          subjects = [
              line.strip()
              for line in subprocess.check_output(log_cmd, text=True).splitlines()
              if line.strip()
          ]
          highlights = subjects[:8]
          if not highlights:
              highlights = ["Release maintenance and packaging updates."]

          body_lines = [
              f"## Highlights",
              "",
          ]
          body_lines.extend(f"- {item}" for item in highlights)
          body_lines.extend(
              [
                  "",
                  "## Install and Upgrade",
                  "",
                  "```bash",
                  "uv tool install weave-agent",
                  "uv tool upgrade weave-agent",
                  "```",
                  "",
                  "## Release Artifacts",
                  "",
                  f"- PyPI package: [`weave-agent`](https://pypi.org/project/weave-agent/) for `{tag.lstrip('v')}`",
                  f"- Controller image: `ghcr.io/danohn/weave-controller:{tag}`",
                  f"- Frontend image: `ghcr.io/danohn/weave-frontend:{tag}`",
                  "- Attached assets: `weave-agent` wheel and source distribution",
                  "",
                  "## Operator Notes",
                  "",
                  "- Compose defaults and install flows track the tagged release.",
                  "- Use `sha-*` container tags only for debugging or exact commit pinning.",
                  "",
                  "## Full Changelog",
                  "",
                  f"- [{compare_range}]({compare_url})",
                  "",
              ]
          )

          Path("release-notes.md").write_text("\n".join(body_lines) + "\n")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            agent/dist/*
