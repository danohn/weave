services:
  traefik:
    image: traefik:v3.1
    container_name: weave-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  nginx:
    build: ./frontend
    container_name: weave-ui
    restart: unless-stopped
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=weave_backend"
      - "traefik.http.routers.weave-ui.rule=Host(`${WEAVE_DOMAIN:?WEAVE_DOMAIN env var must be set}`)"
      - "traefik.http.routers.weave-ui.entrypoints=web"
      - "traefik.http.routers.weave-ui.priority=50"
      - "traefik.http.routers.weave-ui.service=weave-ui"
      - "traefik.http.services.weave-ui.loadBalancer.server.port=80"
      - "traefik.http.routers.weave-ui.middlewares=${TRAEFIK_MIDDLEWARE_UI:-${TRAEFIK_MIDDLEWARE:-}}"

  controller:
    build: ./controller
    container_name: weave-controller
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - SYS_ADMIN
    ports:
      - "51820:51820/udp"
    volumes:
      - weave_db:/app/data
    networks:
      - backend
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/weave.db"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET env var must be set}"
      OIDC_ISSUER: "${OIDC_ISSUER:?OIDC_ISSUER env var must be set}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:?OIDC_CLIENT_ID env var must be set}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET env var must be set}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      OIDC_ADMIN_GROUP: "${OIDC_ADMIN_GROUP:-}"
      VPN_SUBNET: "${VPN_SUBNET:-10.0.0.0/24}"
      WEAVE_DOMAIN: "${WEAVE_DOMAIN:?WEAVE_DOMAIN env var must be set}"
      CONTROLLER_ENDPOINT_PORT: "${CONTROLLER_ENDPOINT_PORT:-51820}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=weave_backend"
      - "traefik.http.routers.weave-api.rule=Host(`${WEAVE_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`) || PathPrefix(`/auth`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.weave-api.entrypoints=web"
      - "traefik.http.routers.weave-api.priority=100"
      - "traefik.http.routers.weave-api.service=weave-api"
      - "traefik.http.services.weave-api.loadBalancer.server.port=8000"
      - "traefik.http.routers.weave-api.middlewares=${TRAEFIK_MIDDLEWARE:-}"

volumes:
  weave_db:

networks:
  backend:
