services:
  nginx:
    image: nginx:alpine
    container_name: weave-ui
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.weave-ui.rule=Host(`${WEAVE_DOMAIN:?WEAVE_DOMAIN env var must be set}`)"
      - "traefik.http.routers.weave-ui.service=weave-ui"
      - "traefik.http.services.weave-ui.loadBalancer.server.port=80"
      - "traefik.http.routers.weave-ui.middlewares=${TRAEFIK_MIDDLEWARE:-}"

  controller:
    build: ./controller
    container_name: weave-controller
    restart: unless-stopped
    volumes:
      - weave_db:/app/data
    networks:
      - backend
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/weave.db"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?ADMIN_TOKEN env var must be set}"
      VPN_SUBNET: "${VPN_SUBNET:-10.0.0.0/24}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.weave-api.rule=Host(`${WEAVE_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/health`))"
      - "traefik.http.routers.weave-api.service=weave-api"
      - "traefik.http.services.weave-api.loadBalancer.server.port=8000"
      - "traefik.http.routers.weave-api.middlewares=${TRAEFIK_MIDDLEWARE:-}"

volumes:
  weave_db:

networks:
  backend:
    external: true
